<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Post 6 — Parallel Worktrees Hero</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1200px;
    height: 627px;
    overflow: hidden;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #0f172a;
  }

  .hero {
    width: 1200px;
    height: 627px;
    position: relative;
    background: linear-gradient(140deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(5,150,105,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(5,150,105,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .blob-tl {
    position: absolute;
    top: -100px; left: -100px;
    width: 480px; height: 480px;
    background: radial-gradient(circle, rgba(5,150,105,0.10) 0%, transparent 70%);
  }

  .blob-br {
    position: absolute;
    bottom: -80px; right: 460px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(34,211,238,0.06) 0%, transparent 70%);
  }

  /* Left panel — text */
  .left-panel {
    position: relative;
    z-index: 10;
    flex: 0 0 540px;
    padding: 0 60px 0 64px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .post-tag {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }

  .post-tag-pill {
    background: rgba(5,150,105,0.15);
    border: 1px solid rgba(5,150,105,0.3);
    color: #10b981;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 999px;
  }

  .post-tag-num {
    color: #475569;
    font-size: 12px;
    letter-spacing: 1px;
  }

  .main-title {
    font-size: 60px;
    font-weight: 800;
    color: #f1f5f9;
    line-height: 1.0;
    letter-spacing: -2px;
    margin-bottom: 8px;
  }

  .main-title-num {
    font-size: 96px;
    font-weight: 900;
    color: #059669;
    letter-spacing: -4px;
    display: block;
    line-height: 1;
    text-shadow: 0 0 40px rgba(5,150,105,0.4);
  }

  .main-title-label {
    font-size: 52px;
    display: block;
    color: #f1f5f9;
    letter-spacing: -1.5px;
  }

  .subtitle {
    font-size: 20px;
    font-weight: 500;
    color: #64748b;
    line-height: 1.45;
    margin-bottom: 36px;
    margin-top: 16px;
    letter-spacing: 0.1px;
  }

  .subtitle span {
    color: #22d3ee;
  }

  /* Metrics inline */
  .metrics-row {
    display: flex;
    gap: 24px;
    margin-bottom: 36px;
  }

  .metric {
    display: flex;
    flex-direction: column;
  }

  .metric-val {
    font-size: 22px;
    font-weight: 700;
    color: #10b981;
    line-height: 1;
  }

  .metric-lbl {
    font-size: 10px;
    color: #475569;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .metric-sep {
    width: 1px;
    background: #1e293b;
    align-self: stretch;
  }

  .author {
    color: #475569;
    font-size: 13px;
    letter-spacing: 0.5px;
  }

  .author strong { color: #64748b; }

  /* Right panel — worktree grid */
  .right-panel {
    position: relative;
    z-index: 10;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-right: 48px;
  }

  .worktree-container {
    position: relative;
    width: 580px;
    height: 480px;
  }

  /* Grid of worktree squares */
  .wt-grid {
    display: grid;
    grid-template-columns: repeat(14, 1fr);
    gap: 5px;
    width: 100%;
  }

  .wt-cell {
    width: 34px;
    height: 34px;
    border-radius: 5px;
    position: relative;
    transition: opacity 0.2s;
  }

  /* Label overlay */
  .grid-label {
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 11px;
    color: #475569;
    letter-spacing: 0.5px;
  }

  /* Legend */
  .legend {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #64748b;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #059669 0%, #22d3ee 40%, #6366f1 80%, #059669 100%);
  }

  /* Corner marks */
  .corner { position: absolute; width: 32px; height: 32px; }
  .corner-tl { top: 20px; left: 20px; border-top: 2px solid rgba(5,150,105,0.35); border-left: 2px solid rgba(5,150,105,0.35); border-radius: 2px 0 0 0; }
  .corner-tr { top: 20px; right: 20px; border-top: 2px solid rgba(5,150,105,0.35); border-right: 2px solid rgba(5,150,105,0.35); border-radius: 0 2px 0 0; }
  .corner-bl { bottom: 20px; left: 20px; border-bottom: 2px solid rgba(34,211,238,0.25); border-left: 2px solid rgba(34,211,238,0.25); border-radius: 0 0 0 2px; }
  .corner-br { bottom: 20px; right: 20px; border-bottom: 2px solid rgba(34,211,238,0.25); border-right: 2px solid rgba(34,211,238,0.25); border-radius: 0 0 2px 0; }
</style>
</head>
<body>
<div class="hero">
  <div class="grid-overlay"></div>
  <div class="blob-tl"></div>
  <div class="blob-br"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Left: Text -->
  <div class="left-panel">
    <div class="post-tag">
      <span class="post-tag-pill">Post 6 of 10</span>
      <span class="post-tag-num">Agentic Development Series</span>
    </div>

    <div class="main-title">
      <span class="main-title-num">194</span>
      <span class="main-title-label">Parallel AI<br>Worktrees</span>
    </div>

    <div class="subtitle">
      <span>Factory-Scale</span> Software Development —<br>
      running hundreds of agents simultaneously
    </div>

    <div class="metrics-row">
      <div class="metric">
        <div class="metric-val">194</div>
        <div class="metric-lbl">Parallel Agents</div>
      </div>
      <div class="metric-sep"></div>
      <div class="metric">
        <div class="metric-val" style="color:#22d3ee;">~$0.08</div>
        <div class="metric-lbl">Cost per Task</div>
      </div>
      <div class="metric-sep"></div>
      <div class="metric">
        <div class="metric-val" style="color:#a78bfa;">90 min</div>
        <div class="metric-lbl">Wall Clock</div>
      </div>
    </div>

    <div class="author">By <strong>Nick Krzemienski</strong></div>
  </div>

  <!-- Right: Worktree grid visual -->
  <div class="right-panel">
    <div class="worktree-container">
      <!-- 14 columns x 14 rows = 196 cells, representing ~194 worktrees -->
      <div class="wt-grid" id="wt-grid"></div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:#059669;"></div>
          Running
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#22d3ee;"></div>
          Testing
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#6366f1;"></div>
          Merging
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#f59e0b;"></div>
          Queued
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#1e293b; border:1px solid #334155;"></div>
          Idle
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-bar"></div>
</div>

<script>
  // Generate deterministic worktree grid
  const grid = document.getElementById('wt-grid');
  const total = 196; // 14x14

  // State distribution: ~60% running, ~15% testing, ~10% merging, ~10% queued, ~5% idle
  const states = [
    { color: '#059669', glow: 'rgba(5,150,105,0.5)',  label: 'running',  weight: 60 },
    { color: '#22d3ee', glow: 'rgba(34,211,238,0.5)', label: 'testing',  weight: 15 },
    { color: '#6366f1', glow: 'rgba(99,102,241,0.5)', label: 'merging',  weight: 10 },
    { color: '#f59e0b', glow: 'rgba(245,158,11,0.5)', label: 'queued',   weight: 10 },
    { color: '#1e293b', glow: null,                    label: 'idle',     weight:  5 },
  ];

  // Build weighted state array
  const pool = [];
  states.forEach(s => {
    for (let i = 0; i < s.weight; i++) pool.push(s);
  });

  // Seeded pseudo-random for determinism
  let seed = 42;
  function rand() {
    seed = (seed * 1664525 + 1013904223) & 0xffffffff;
    return (seed >>> 0) / 0xffffffff;
  }

  for (let i = 0; i < total; i++) {
    const state = pool[Math.floor(rand() * pool.length)];
    const opacity = 0.55 + rand() * 0.45;
    const cell = document.createElement('div');
    cell.className = 'wt-cell';
    cell.style.background = state.color;
    cell.style.opacity = opacity;
    if (state.glow) {
      cell.style.boxShadow = `0 0 6px ${state.glow}`;
    }
    // First 194 are "active" worktrees, last 2 idle
    if (i >= 194) {
      cell.style.background = '#1e293b';
      cell.style.border = '1px solid #334155';
      cell.style.opacity = '0.4';
      cell.style.boxShadow = 'none';
    }
    grid.appendChild(cell);
  }
</script>
</body>
</html>
